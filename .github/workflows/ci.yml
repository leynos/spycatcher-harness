name: CI

'on':
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      MERMAN_CLI_VERSION: '0.7.0'
      WHITAKER_INSTALLER_VERSION: '0.2.5'
      CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN || '' }}
      CODESCENE_CLI_SHA256: ${{ vars.CODESCENE_CLI_SHA256 || '' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Setup Rust for Merman
        run: rustup toolchain install 1.95.0
      - name: Cache Merman CLI
        id: cache-merman-cli
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: ~/.cargo/bin/merman-cli
          key: merman-cli-${{ runner.os }}-${{ runner.arch }}-${{ env.MERMAN_CLI_VERSION }}
      - name: Install Merman CLI
        if: steps.cache-merman-cli.outputs.cache-hit != 'true'
        run: cargo +1.95.0 install merman-cli --version "=${MERMAN_CLI_VERSION}" --locked
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
      - name: Setup uv
        uses: astral-sh/setup-uv@c5680ec91f7b9b91406fab4ded5d45245abf7b67
      - name: Install Nixie
        run: uv tool install nixie-cli==1.1.0
      - name: Format
        run: make check-fmt
      - name: Spelling
        run: make spelling
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25
        with:
          globs: |
            **/*.md
            !**/.uv-cache/**
            !**/.uv-tools/**
            !**/target/**
            !**/dist/**
      - name: Validate Mermaid diagrams
        run: make nixie
      - name: Cache Whitaker installer
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install Whitaker
        run: |
          if ! command -v whitaker-installer >/dev/null 2>&1; then
            if cargo binstall --version >/dev/null 2>&1; then
              cargo binstall --no-confirm --locked "whitaker-installer@${WHITAKER_INSTALLER_VERSION}"
            else
              echo "cargo-binstall unavailable; building whitaker-installer from crates.io"
              cargo install --locked whitaker-installer --version "${WHITAKER_INSTALLER_VERSION}"
            fi
          fi
          whitaker-installer
      - name: Lint
        run: make lint
      - name: Test and Measure Coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          output-path: lcov.info
          format: lcov
          use-cargo-nextest: 'false'
          with-ratchet: 'true'
      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: github.event_name == 'pull_request' && env.CS_ACCESS_TOKEN != ''
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          format: lcov
          mode: check
          project-url: https://api.codescene.io/v2/projects/77452
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
